- id: m01w01_boss
  title: "BOSS: Pipeline local CSV→JSON→Validado"
  description: "Construye un script pipeline.py que: 1) Lee un CSV de contactos de cobranza (crea datos fake con 100 filas), 2) Limpia y normaliza cada fila usando tus funciones de utils.py, 3) Valida campos obligatorios (teléfono, nombre, monto), 4) Escribe los válidos a output.json y los inválidos a errors.json, 5) Imprime resumen: total/válidos/inválidos. Incluye logging."
  type: boss
  xp: 300
  skill: data_engineering
  duration_min: 90
  month: 1
  week: 1
  requires: m01w01d05
  acceptance: "pipeline.py corre con python pipeline.py, procesa 100 filas, genera output.json y errors.json, e imprime resumen con conteos."
  output: "projects/01_data_engineering/pipeline.py + sample_data/contacts.csv"
  github_hint: "Crea branch boss/m01w01-pipeline, trabaja ahí, y abre PR al terminar."

