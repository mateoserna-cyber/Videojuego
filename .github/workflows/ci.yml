name: CI — GCP Quest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check game/ --ignore E501

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "No tests yet — add them!"

      - name: Verify game loads
        run: python -c "from game.player import Player; p = Player(); print(f'Player loaded: {p.name}, Level {p.level}')"
